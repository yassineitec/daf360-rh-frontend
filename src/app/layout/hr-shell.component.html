<!-- Mobile overlay backdrop -->
<div class="mob-overlay" [class.mob-overlay--open]="sidebarOpen()" (click)="closeSidebar()"></div>

<!-- Sidebar -->
<daf-side-nav
  [class.sidebar--open]="sidebarOpen()"
  [items]="navItems()"
  [config]="sideNavConfig"
  [activeRoute]="activeRoute()"
  (itemClick)="onNavClick($event)" />

<!-- Mobile top bar: hamburger sits in normal flow instead of floating over content -->
<div class="mob-topbar">
  <button class="mob-hamburger" (click)="toggleSidebar()" aria-label="Menu">
    <span class="material-symbols-outlined">menu</span>
  </button>
</div>

<main class="shell-content">
  <router-outlet />
</main>
