<div class="step-emergency">
  <p class="step-intro">Personne à contacter en cas d'urgence (optionnel).</p>

  <div class="form-grid">

    <div class="form-field form-full">
      <label class="form-label">Nom complet</label>
      <daf-form-field
        [options]="{ placeholder: 'ex : Marie Dupont' }"
        [value]="emergencyContactName()"
        (valueChange)="emergencyContactName.set($any($event) ?? ''); emit()" />
    </div>

    <div class="form-field form-full">
      <label class="form-label">Relation (ex&nbsp;: Conjoint, Parent…)</label>
      <daf-form-field
        [options]="{ placeholder: 'ex : Conjoint(e)' }"
        [value]="emergencyContactRelation()"
        (valueChange)="emergencyContactRelation.set($any($event) ?? ''); emit()" />
    </div>

    <div class="form-field form-full">
      <label class="form-label">Téléphone</label>
      <daf-form-field
        [options]="{ placeholder: 'ex : +216 XX XXX XXX', prefixIcon: 'phone' }"
        [value]="emergencyContactPhone()"
        (valueChange)="emergencyContactPhone.set($any($event) ?? ''); emit()" />
    </div>

  </div>
</div>
