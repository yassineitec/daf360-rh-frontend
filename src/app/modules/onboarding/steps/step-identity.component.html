<div class="step-identity">
  <div class="form-grid">

    <!-- Row 1: firstName | lastName -->
    <div class="form-group">
      <label class="form-label">Prénom <span class="req">*</span></label>
      <daf-form-field
        [options]="{ placeholder: 'ex. Yassine' }"
        [value]="firstName()"
        (valueChange)="firstName.set($any($event) ?? ''); emit()" />
    </div>

    <div class="form-group">
      <label class="form-label">Nom <span class="req">*</span></label>
      <daf-form-field
        [options]="{ placeholder: 'ex. Rhouma' }"
        [value]="lastName()"
        (valueChange)="lastName.set($any($event) ?? ''); emit()" />
    </div>

    <!-- Row 2: dateOfBirth | gender -->
    <div class="form-group">
      <label class="form-label">Date de naissance</label>
      <daf-multi-date-picker
        [value]="isoToDate(dateOfBirth() || null)"
        [config]="{ placeholder: 'Sélectionner', selectionMode: 'single' }"
        (valueChange)="dateOfBirth.set(dateToIso($event) || ''); emit()" />
    </div>

    <div class="form-group">
      <label class="form-label">Genre</label>
      <daf-select
        [selected]="gender() ? [gender()] : []"
        [options]="genderOptions()"
        [config]="{ placeholder: '— Sélectionner —', fullWidth: true, searchable: true }"
        (selectedChange)="gender.set($event[0] ?? ''); emit()" />
    </div>

    <!-- Row 3: nationality | nationalId -->
    <div class="form-group">
      <label class="form-label">Nationalité</label>
      <daf-select
        [selected]="nationalityId() != null ? [nationalityId()!.toString()] : []"
        [options]="nationalityOptions()"
        [config]="{ placeholder: '— Sélectionner —', fullWidth: true, searchable: true }"
        (selectedChange)="nationalityId.set($event[0] ? +$event[0] : null); emit()" />
    </div>

    <div class="form-group">
      <label class="form-label">CIN / Identifiant national</label>
      <daf-form-field
        [options]="{ placeholder: 'ex. 12345678' }"
        [value]="nationalId()"
        (valueChange)="nationalId.set($any($event) ?? ''); emit()" />
    </div>

    <!-- Row 4 (full-width): passportNumber -->
    <div class="form-group form-full">
      <label class="form-label">Numéro de passeport</label>
      <daf-form-field
        [options]="{ placeholder: 'ex. AB1234567' }"
        [value]="passportNumber()"
        (valueChange)="passportNumber.set($any($event) ?? ''); emit()" />
    </div>

    <!-- Row 5 (full-width): photo — uploaded after profile creation -->
    <div class="form-group form-full">
      <label class="form-label">Photo de profil</label>
      <div style="background:#f2f4f6;border-radius:8px;padding:12px 14px;display:flex;align-items:center;gap:10px;">
        <span class="material-symbols-outlined" style="font-size:18px;color:#44474c;">info</span>
        <p style="font-size:12px;color:#44474c;margin:0;">La photo de profil pourra être ajoutée depuis la fiche employé après la création du compte.</p>
      </div>
    </div>

  </div>
</div>
