<div class="step-personal">
  <div class="section-header">
    <h3 class="section-title">Informations personnelles &amp; Sociales</h3>
    <p class="section-sub">Numéro de sécurité sociale, situation familiale, coordonnées personnelles</p>
  </div>

  <div class="form-grid">
    <!-- Row 1: Social Security Number (DB: cnss_number) | Affiliation Date -->
    <div class="form-field">
      <label class="form-label">N° de Sécurité Sociale <span class="req">*</span></label>
      <daf-form-field
        [options]="{ placeholder: 'Ex: 123456789' }"
        [value]="cnssNumber()"
        (valueChange)="cnssNumber.set($any($event) ?? ''); emit()" />
    </div>

    <div class="form-field">
      <label class="form-label">Date d'affiliation Sécurité Sociale</label>
      <daf-multi-date-picker
        [value]="isoToDate(cnssAffiliationDate() || null)"
        [config]="{ placeholder: 'Sélectionner', selectionMode: 'single' }"
        (valueChange)="cnssAffiliationDate.set(dateToIso($event) || ''); emit()" />
    </div>

    <!-- Row 2: Marital Status | Number of Children -->
    <div class="form-field">
      <label class="form-label">Situation familiale</label>
      <daf-select
        [selected]="maritalStatus() ? [maritalStatus()] : []"
        [options]="maritalOptions()"
        [config]="{ placeholder: '— Sélectionner —', fullWidth: true }"
        (selectedChange)="maritalStatus.set($event[0] ?? ''); emit()" />
    </div>

    <div class="form-field">
      <label class="form-label">Nombre d'enfants</label>
      <daf-form-field
        [options]="{ type: 'number', placeholder: '0' }"
        [value]="numberOfChildren()"
        (valueChange)="numberOfChildren.set($event == null || $event === '' ? null : +$event); emit()" />
    </div>

    <!-- Row 3: Phone | empty -->
    <div class="form-field">
      <label class="form-label">Téléphone personnel</label>
      <daf-form-field
        [options]="{ placeholder: 'Ex: +216 XX XXX XXX', prefixIcon: 'phone' }"
        [value]="phone()"
        (valueChange)="phone.set($any($event) ?? ''); emit()" />
    </div>

    <div class="form-field form-empty"></div>

    <!-- Row 4: Home Address (full-width textarea) -->
    <div class="form-field form-full">
      <label class="form-label">Adresse personnelle</label>
      <daf-form-field
        [options]="{ type: 'textarea', rows: 3, placeholder: 'Rue, code postal, ville, pays…' }"
        [value]="personalAddress()"
        (valueChange)="personalAddress.set($any($event) ?? ''); emit()" />
    </div>
  </div>
</div>
