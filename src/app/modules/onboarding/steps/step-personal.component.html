<div class="step-personal">
  <div class="section-header">
    <h3 class="section-title">Informations personnelles &amp; Sociales</h3>
    <p class="section-sub">Numéro CNSS, situation familiale, coordonnées personnelles</p>
  </div>

  <div class="form-grid">
    <!-- Row 1: CNSS Number | CNSS Affiliation Date -->
    <div class="form-field">
      <label class="form-label">
        N° CNSS <span class="req">*</span>
      </label>
      <input
        type="text"
        class="form-input"
        placeholder="Ex: 123456789"
        [ngModel]="cnssNumber()"
        (ngModelChange)="cnssNumber.set($event); emit()"
      />
    </div>

    <div class="form-field">
      <label class="form-label">Date d'affiliation CNSS</label>
      <input
        type="date"
        class="form-input"
        [ngModel]="cnssAffiliationDate()"
        (ngModelChange)="cnssAffiliationDate.set($event); emit()"
      />
    </div>

    <!-- Row 2: Marital Status | Number of Children -->
    <div class="form-field">
      <label class="form-label">Situation familiale</label>
      <select
        class="form-input form-select"
        [ngModel]="maritalStatus()"
        (ngModelChange)="maritalStatus.set($event); emit()"
      >
        @for (opt of (maritalOptions$ | async) ?? emptyList; track $index) {
          <option [value]="opt.valueCode">{{ opt.labelFr }}</option>
        }
      </select>
    </div>

    <div class="form-field">
      <label class="form-label">Nombre d'enfants</label>
      <input
        type="number"
        class="form-input"
        min="0"
        placeholder="0"
        [ngModel]="numberOfChildren()"
        (ngModelChange)="numberOfChildren.set($event === '' || $event === null ? null : +$event); emit()"
      />
    </div>

    <!-- Row 3: Phone | empty -->
    <div class="form-field">
      <label class="form-label">Téléphone personnel</label>
      <input
        type="tel"
        class="form-input"
        placeholder="Ex: +216 XX XXX XXX"
        [ngModel]="phone()"
        (ngModelChange)="phone.set($event); emit()"
      />
    </div>

    <div class="form-field form-empty"></div>

    <!-- Row 4: Home Address (full-width textarea) -->
    <div class="form-field form-full">
      <label class="form-label">Adresse personnelle</label>
      <textarea
        class="form-textarea"
        rows="3"
        placeholder="Rue, code postal, ville, pays…"
        [ngModel]="personalAddress()"
        (ngModelChange)="personalAddress.set($event); emit()"
      ></textarea>
    </div>
  </div>
</div>
