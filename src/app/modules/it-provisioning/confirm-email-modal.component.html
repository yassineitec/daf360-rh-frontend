<app-modal
  title="Confirmer la création du compte"
  [visible]="visible()"
  (closed)="closed.emit()"
  [hasFooter]="true"
>
  <div class="confirm-body">
    <div class="warn-icon" aria-hidden="true">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#f39c12" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
        <line x1="12" y1="9" x2="12" y2="13"/>
        <line x1="12" y1="17" x2="12.01" y2="17"/>
      </svg>
    </div>
    <p class="confirm-title">Action irréversible</p>
    <p class="confirm-text">
      Vous êtes sur le point de créer le compte utilisateur officiel pour
      <strong>{{ candidateName() }}</strong> avec l'adresse email :
    </p>
    <p class="confirm-email">{{ email() }}</p>
    <p class="confirm-warning">
      Cette action créera un compte dans le système DAF360 et est <strong>irréversible</strong>.
      Veuillez vérifier l'adresse email avant de confirmer.
    </p>
  </div>

  <div slot="footer">
    <button type="button" class="btn-cancel" (click)="closed.emit()">Annuler</button>
    <button type="button" class="btn-confirm" (click)="confirmed.emit()">
      Confirmer la création
    </button>
  </div>
</app-modal>
