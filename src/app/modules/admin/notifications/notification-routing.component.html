<div class="nr-page">

  <!-- Header -->
  <div class="nr-header">
    <h2 class="nr-title">Événements</h2>
    <div class="nr-search">
      <daf-form-field
        [options]="{ type: 'search', placeholder: 'Rechercher…', fullWidth: true }"
        [value]="searchQuery()"
        (valueChange)="onSearch($any($event) ?? '')" />
    </div>
  </div>

  @if (error()) {
    <div class="nr-error">{{ error() }}</div>
  }

  <!-- Event table -->
  <daf-data-table
    [columns]="columns"
    [rows]="rows()"
    [config]="tableConfig()"
    (rowClick)="selectType($event['_source'])">

    <ng-template dafCell="badges" let-row>
      <div class="nr-badges">
        @if (row['_source'].sendInapp) {
          <daf-badge label="IN-APP" [options]="{ variant: 'info', size: 'sm' }" />
        }
        @if (row['_source'].sendEmail) {
          <daf-badge label="EMAIL" [options]="{ variant: 'teal', size: 'sm' }" />
        }
        @if (row['_source'].isSystem) {
          <daf-badge label="SYSTÈME" [options]="{ variant: 'warning', size: 'sm' }" />
        }
      </div>
    </ng-template>

  </daf-data-table>

  <!-- Count + Pagination -->
  <div class="nr-footer">
    <span class="nr-count">
      <strong>{{ totalElements() }}</strong> événement(s)
    </span>
    @if (totalPages() > 1) {
      <daf-pagination
        [currentPage]="currentPage()"
        [totalPages]="totalPages()"
        [totalElements]="totalElements()"
        (pageChange)="onPageChange($event)" />
    }
  </div>

</div>

<!-- Routing rule editor modal -->
<app-modal
  [title]="selectedType()?.labelFr ?? ''"
  [visible]="showModal()"
  size="xl"
  (closed)="closeModal()">
  @if (selectedType()) {
    <app-routing-rule-editor [eventType]="selectedType()!" />
  }
</app-modal>
