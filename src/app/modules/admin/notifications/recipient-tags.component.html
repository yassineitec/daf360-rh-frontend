<div class="rt-section">
  <p class="rt-title">{{ sectionTitle() }}</p>
  <div class="rt-tags">
    @for (r of recipients(); track r.id) {
      <span class="rt-tag">
        {{ r.roleName }}
        <button class="rt-remove" type="button" (click)="onRemove(r.id)" title="Retirer">×</button>
      </span>
    }
    @if (recipients().length === 0) {
      <span class="rt-empty">Aucun rôle configuré</span>
    }
  </div>
  <div class="rt-add">
    @if (!showDropdown()) {
      <daf-button label="+ Ajouter un rôle" variant="ghost" [options]="{ size: 'sm' }" (onClick)="showDropdown.set(true)" />
    } @else {
      <div class="rt-add-row">
        <daf-select
          class="rt-select"
          [selected]="selectedRoleValue()"
          [options]="roleOptions()"
          [config]="{ placeholder: '-- Sélectionner un rôle --' }"
          (selectedChange)="onSelectRole($event[0] ?? '')" />
        <daf-button label="Ajouter" variant="teal" [options]="{ size: 'sm', disabled: !selectedRoleId() }" (onClick)="onAdd()" />
        <daf-button label="✕" variant="ghost" [options]="{ size: 'sm' }" (onClick)="showDropdown.set(false)" />
      </div>
    }
  </div>
</div>
