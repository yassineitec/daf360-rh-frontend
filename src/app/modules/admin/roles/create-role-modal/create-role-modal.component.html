<app-modal
  title="Créer un nouveau rôle"
  [visible]="visible()"
  [hasFooter]="true"
  (closed)="closed.emit()"
>
  <div class="crm-body">
    @if (error()) {
      <div class="crm-error">{{ error() }}</div>
    }

    <!-- Nom du rôle -->
    <div class="crm-field">
      <daf-form-field
        [options]="{ label: 'Nom du rôle', placeholder: 'Ex : Responsable paie', required: true, disabled: saving(), fullWidth: true }"
        [value]="frenchName()"
        (valueChange)="frenchName.set($any($event))" />
    </div>

    <!-- Rôle parent -->
    <div class="crm-field">
      <daf-select
        [selected]="parentSelected()"
        [options]="parentOptions()"
        [config]="{ label: 'Rôle parent', placeholder: '— Aucun —', disabled: saving(), fullWidth: true }"
        (selectedChange)="onParentChange($event[0] ?? '')" />
    </div>

    <!-- Voir toutes les entités -->
    <div class="crm-field crm-field-toggle">
      <daf-toggle
        [options]="{ label: 'Voir toutes les entités', hint: 'Ce rôle peut accéder aux données de toutes les entités', disabled: saving() }"
        [checked]="showAll()"
        (checkedChange)="showAll.set($event)" />
    </div>
  </div>

  <!-- Footer -->
  <div slot="footer">
    <daf-button
      label="Annuler"
      variant="secondary"
      [options]="{ disabled: saving() }"
      (onClick)="closed.emit()" />
    <daf-button
      [label]="saving() ? 'Création en cours…' : 'Créer le rôle'"
      variant="teal"
      [options]="{ disabled: saving() || !frenchName().trim(), loading: saving() }"
      (onClick)="create()" />
  </div>
</app-modal>
