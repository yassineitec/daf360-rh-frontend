<app-modal
  [title]="'ADMIN.roles.create.TITLE' | translate"
  [visible]="visible()"
  [hasFooter]="true"
  (closed)="closed.emit()"
>
  <div class="crm-body">
    @if (error()) {
      <div class="crm-error">{{ error() }}</div>
    }

    <!-- Nom du rôle -->
    <div class="crm-field">
      <daf-form-field
        [options]="{ label: ('ADMIN.roles.create.NAME_LABEL' | translate), placeholder: ('ADMIN.roles.create.NAME_PLACEHOLDER' | translate), required: true, disabled: saving(), fullWidth: true }"
        [value]="frenchName()"
        (valueChange)="frenchName.set($any($event))" />
    </div>

    <!-- Rôle parent -->
    <div class="crm-field">
      <daf-select
        [selected]="parentSelected()"
        [options]="parentOptions()"
        [config]="{ label: ('ADMIN.roles.create.PARENT_LABEL' | translate), placeholder: ('ADMIN.roles.create.PARENT_PLACEHOLDER' | translate), disabled: saving(), fullWidth: true }"
        (selectedChange)="onParentChange($event[0])" />
    </div>

    <!-- Voir toutes les entités -->
    <div class="crm-field crm-field-toggle">
      <daf-toggle
        [options]="{ label: ('ADMIN.roles.create.SHOW_ALL_LABEL' | translate), hint: ('ADMIN.roles.create.SHOW_ALL_HINT' | translate), disabled: saving() }"
        [checked]="showAll()"
        (checkedChange)="showAll.set($event)" />
    </div>
  </div>

  <!-- Footer -->
  <div slot="footer">
    <daf-button
      [label]="'ADMIN.roles.create.CANCEL' | translate"
      variant="secondary"
      [options]="{ disabled: saving() }"
      (onClick)="closed.emit()" />
    <daf-button
      [label]="saving() ? ('ADMIN.roles.create.SAVING' | translate) : ('ADMIN.roles.create.SUBMIT' | translate)"
      variant="teal"
      [options]="{ disabled: saving() || !frenchName().trim(), loading: saving() }"
      (onClick)="create()" />
  </div>
</app-modal>
